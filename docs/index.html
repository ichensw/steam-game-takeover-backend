<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>兔兔窝后端接口文档</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f5f7fb;
      color: #172033;
      font: 14px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid #e3e8f2;
      background: #fff;
      padding: 18px 14px;
    }
    .brand {
      padding: 0 8px 14px;
      font-size: 18px;
      font-weight: 700;
    }
    .prefix {
      margin: 0 0 14px;
      padding: 10px 12px;
      border: 1px solid #e3e8f2;
      border-radius: 8px;
      background: #f8fafc;
      color: #475569;
      font-size: 12px;
    }
    .prefix code {
      display: block;
      margin-top: 4px;
      word-break: break-all;
    }
    .group {
      margin-bottom: 8px;
      border: 1px solid #edf1f7;
      border-radius: 8px;
      overflow: hidden;
    }
    .group-title {
      width: 100%;
      border: 0;
      background: #f8fafc;
      color: #172033;
      padding: 10px 12px;
      text-align: left;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }
    .group-title::before {
      content: "▸";
      display: inline-block;
      width: 18px;
      color: #64748b;
    }
    .group.open .group-title::before { content: "▾"; }
    .group-items { display: none; padding: 6px; }
    .group.open .group-items { display: block; }
    .nav-item {
      width: 100%;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #334155;
      padding: 8px 10px;
      text-align: left;
      font: inherit;
      cursor: pointer;
    }
    .nav-item:hover { background: #eef4ff; color: #1d4ed8; }
    .nav-item.active { background: #2563eb; color: #fff; }
    .content {
      padding: 28px;
    }
    article {
      max-width: 980px;
      min-height: calc(100vh - 56px);
      background: #fff;
      border: 1px solid #e3e8f2;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 10px 32px rgba(22, 32, 51, 0.06);
    }
    h1, h2, h3 { line-height: 1.25; margin: 1.4em 0 .65em; }
    h1 { margin-top: 0; font-size: 26px; }
    h2 { font-size: 21px; }
    h3 { font-size: 18px; }
    pre {
      overflow: auto;
      padding: 14px 16px;
      border-radius: 6px;
      background: #111827;
      color: #f9fafb;
    }
    .request-example {
      margin: 0 0 22px;
      padding: 14px;
      border: 1px solid #e3e8f2;
      border-radius: 8px;
      background: #f8fafc;
    }
    .request-example h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .request-example pre { margin: 10px 0 0; }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    :not(pre) > code {
      padding: 2px 5px;
      border-radius: 4px;
      background: #edf2f7;
      color: #26364d;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0 22px;
    }
    th, td {
      border: 1px solid #e5e9f2;
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
    }
    th { background: #f3f6fb; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .empty, .error { color: #b91c1c; }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        max-height: 45vh;
      }
      .content { padding: 16px; }
      article { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">接口文档</div>
      <div class="prefix">
        基础请求前缀
        <code>https://rabbits.ink/miniprogram-api</code>
      </div>
      <div id="nav">加载中...</div>
    </aside>
    <main class="content">
      <article id="content">加载中...</article>
    </main>
  </div>

  <script>
    const API_PREFIX = 'https://rabbits.ink/miniprogram-api'

    const escapeHtml = value => value
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')

    const inline = value => escapeHtml(value)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')

    const renderTable = lines => {
      const rows = lines
        .filter((line, index) => index !== 1)
        .map(line => line.trim().slice(1, -1).split('|').map(cell => inline(cell.trim())))
      return '<table><thead><tr>' + rows[0].map(cell => `<th>${cell}</th>`).join('') +
        '</tr></thead><tbody>' + rows.slice(1).map(row => '<tr>' + row.map(cell => `<td>${cell}</td>`).join('') + '</tr>').join('') +
        '</tbody></table>'
    }

    const renderMarkdown = markdown => {
      const lines = markdown.replace(/\r\n/g, '\n').split('\n')
      const html = []
      let paragraph = []
      let code = []
      let table = []
      let inCode = false

      const flushParagraph = () => {
        if (paragraph.length) {
          html.push('<p>' + inline(paragraph.join(' ')) + '</p>')
          paragraph = []
        }
      }
      const flushTable = () => {
        if (table.length) {
          html.push(renderTable(table))
          table = []
        }
      }

      for (const line of lines) {
        if (line.startsWith('```')) {
          if (inCode) {
            html.push('<pre><code>' + escapeHtml(code.join('\n')) + '</code></pre>')
            code = []
            inCode = false
          } else {
            flushParagraph()
            flushTable()
            inCode = true
          }
          continue
        }
        if (inCode) {
          code.push(line)
          continue
        }
        if (/^\|.+\|$/.test(line.trim())) {
          flushParagraph()
          table.push(line)
          continue
        }
        flushTable()
        if (line.startsWith('### ')) {
          flushParagraph()
          html.push('<h1>' + inline(line.slice(4)) + '</h1>')
        } else if (line.startsWith('## ')) {
          flushParagraph()
          html.push('<h2>' + inline(line.slice(3)) + '</h2>')
        } else if (line.startsWith('# ')) {
          flushParagraph()
          html.push('<h1>' + inline(line.slice(2)) + '</h1>')
        } else if (line.startsWith('- ')) {
          flushParagraph()
          html.push('<p>• ' + inline(line.slice(2)) + '</p>')
        } else if (line.trim() === '') {
          flushParagraph()
        } else {
          paragraph.push(line.trim())
        }
      }
      flushParagraph()
      flushTable()
      return html.join('\n')
    }

    const requestExample = markdown => {
      const block = markdown.match(/```http\n([\s\S]*?)```/)
      if (!block) return ''
      const lines = block[1].split('\n').map(line => line.trim()).filter(Boolean)
      const firstLine = lines[0] || ''
      const match = firstLine.match(/^(GET|POST|PUT|DELETE|PATCH)\s+(\S+)/)
      if (!match || !match[2].startsWith('/api/')) return ''

      const headers = lines.slice(1)
      const hasJson = headers.some(line => /Content-Type:\s*application\/json/i.test(line))
      const hasMultipart = headers.some(line => /multipart\/form-data/i.test(line))
      const body = markdown.match(/请求：[\s\S]*?```json\n([\s\S]*?)```/)
      const command = [
        `curl -X ${match[1]} "${API_PREFIX}${match[2]}"`,
        ...headers.map(line => `  -H "${line.replace(/"/g, '\\"')}"`),
        ...(hasJson && body ? [`  -d '${body[1].trim().replace(/'/g, "'\\''")}'`] : []),
        ...(hasMultipart ? ['  -F "file=@/path/to/file.jpg"'] : [])
      ].join(' \\\n')

      return `
        <section class="request-example">
          <h2>完整请求示例</h2>
          <p>基础请求前缀：<code>${API_PREFIX}</code></p>
          <pre><code>${escapeHtml(command)}</code></pre>
        </section>
      `
    }

    const parseDocs = markdown => {
      const lines = markdown.replace(/\r\n/g, '\n').split('\n')
      const groups = []
      let currentGroup = null
      let currentItem = null

      const pushItem = () => {
        if (currentGroup && currentItem) currentGroup.items.push(currentItem)
        currentItem = null
      }
      const pushGroup = () => {
        pushItem()
        if (currentGroup && currentGroup.title !== '基础约定' && currentGroup.items.length) groups.push(currentGroup)
        currentGroup = null
      }

      for (const line of lines) {
        if (line.startsWith('## ')) {
          pushGroup()
          currentGroup = { title: line.slice(3).trim(), items: [] }
          continue
        }
        if (!currentGroup || currentGroup.title === '基础约定') continue
        if (line.startsWith('### ')) {
          pushItem()
          currentItem = { title: line.slice(4).trim(), markdown: line + '\n' }
          continue
        }
        if (currentItem) currentItem.markdown += line + '\n'
      }
      pushGroup()
      return groups
    }

    const renderNav = groups => {
      document.getElementById('nav').innerHTML = groups.map((group, groupIndex) => `
        <section class="group ${groupIndex === 0 ? 'open' : ''}" data-group="${groupIndex}">
          <button class="group-title" type="button">${escapeHtml(group.title)}</button>
          <div class="group-items">
            ${group.items.map((item, itemIndex) => `<button class="nav-item" type="button" data-group="${groupIndex}" data-item="${itemIndex}">${escapeHtml(item.title)}</button>`).join('')}
          </div>
        </section>
      `).join('')
    }

    const selectItem = (groups, groupIndex, itemIndex) => {
      const item = groups[groupIndex] && groups[groupIndex].items[itemIndex]
      if (!item) {
        document.getElementById('content').innerHTML = '<p class="empty">请选择左侧接口</p>'
        return
      }
      document.querySelectorAll('.nav-item').forEach(button => button.classList.remove('active'))
      const button = document.querySelector(`.nav-item[data-group="${groupIndex}"][data-item="${itemIndex}"]`)
      if (button) button.classList.add('active')
      document.querySelectorAll('.group').forEach(group => group.classList.remove('open'))
      const group = document.querySelector(`.group[data-group="${groupIndex}"]`)
      if (group) group.classList.add('open')
      document.getElementById('content').innerHTML = requestExample(item.markdown) + renderMarkdown(item.markdown)
      history.replaceState(null, '', `#${groupIndex}-${itemIndex}`)
    }

    fetch('api.md', { cache: 'no-store' })
      .then(response => response.ok ? response.text() : Promise.reject(new Error('文档加载失败')))
      .then(markdown => {
        const groups = parseDocs(markdown)
        renderNav(groups)
        document.getElementById('nav').addEventListener('click', event => {
          const target = event.target
          if (target.classList.contains('group-title')) {
            target.closest('.group').classList.toggle('open')
            return
          }
          if (target.classList.contains('nav-item')) {
            selectItem(groups, Number(target.dataset.group), Number(target.dataset.item))
          }
        })
        const match = location.hash.match(/^#(\d+)-(\d+)$/)
        selectItem(groups, match ? Number(match[1]) : 0, match ? Number(match[2]) : 0)
      })
      .catch(error => {
        document.getElementById('content').innerHTML = '<p class="error">' + escapeHtml(error.message) + '</p>'
      })
  </script>
</body>
</html>
